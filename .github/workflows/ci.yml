name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # The 3.13 job installs against requirements-lock.txt for a reproducible,
        # pinned build (the interpreter the lock is verified against). The 3.10
        # floor stays unpinned so it keeps proving the abstract lower bounds in
        # pyproject.toml still resolve (the lock's numpy 2.5.x needs Python 3.11+).
        include:
          - python-version: "3.10"
            constraints: ""
          - python-version: "3.13"
            constraints: "-c requirements-lock.txt"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install OpenCV system libraries
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install project
        # The dev extra pulls in httpx, which FastAPI's TestClient (used by the
        # API test suite) needs; without it tests/test_api.py fails to import.
        run: python -m pip install -e ".[dev]" ${{ matrix.constraints }}

      - name: Run tests
        run: python -m unittest discover -s tests

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run

      - name: Build frontend
        run: npm run build
